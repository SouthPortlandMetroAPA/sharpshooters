<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>SharpShooters — South Portland Metro APA</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <style>
      :root {
        --spm-primary: #ea002a;
        --spm-accent: #0031a1;
        --bg: #f5f5f5;
        --card: #ffffff;
        --border: #e1e1e1;
        --text: #1f1f1f;
        --muted: #888;
      }

      * { box-sizing: border-box; margin: 0; padding: 0; }

      html, body {
        width: 100%;
        background: var(--bg);
        color: var(--text);
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          Roboto, sans-serif;
        font-size: 16px;
      }

      /* Hidden until maintenance check passes */
      body { visibility: hidden; }

      .page {
        width: 100%;
        max-width: 600px;
        margin: 0 auto;
        padding: 12px;
      }

      /* ── Header ── */

      header {
        width: 100%;
        border-radius: 12px;
        padding: 18px 16px 16px;
        color: #fff;
        background: linear-gradient(135deg, var(--spm-primary), var(--spm-accent));
        box-shadow: 0 4px 14px rgba(0, 0, 0, 0.22);
        text-align: center;
        margin-bottom: 14px;
      }

      .title {
        font-size: 1.5rem;
        font-weight: 900;
        line-height: 1.08;
      }

      .subtitle-group {
        display: inline-block;
        margin-top: 8px;
      }

      .subtitle {
        font-size: 1.6rem;
        font-weight: 400;
        font-style: italic;
        opacity: 0.95;
      }

      .beta-pill {
        display: inline-block;
        margin-top: 4px;
        padding: 3px 14px;
        border-radius: 999px;
        font-size: 0.65rem;
        font-weight: 800;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        background: rgba(255,255,255,0.2);
        color: #fff;
        border: 1.5px solid rgba(255,255,255,0.5);
      }

      .header-status {
        margin: 8px 0 0;
        font-size: 0.85rem;
        opacity: 0.9;
      }

      /* ── Controls Card ── */

      .controls-card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 16px;
        box-shadow: 0 3px 10px rgba(0, 0, 0, 0.1);
        margin-bottom: 14px;
      }

      .select-wrapper {
        position: relative;
        margin-bottom: 10px;
      }

      .select-wrapper:last-child {
        margin-bottom: 0;
      }

      .select-wrapper select {
        width: 100%;
        padding: 10px 36px 10px 14px;
        font-size: 0.9rem;
        border-radius: 999px;
        border: 1px solid var(--border);
        background: var(--bg);
        text-align: center;
        text-align-last: center;
        outline: none;
        appearance: none;
        -webkit-appearance: none;
        color: var(--text);
        font-weight: 600;
        cursor: pointer;
      }

      .select-wrapper::after {
        content: "\25BC";
        position: absolute;
        right: 14px;
        top: 50%;
        transform: translateY(-50%);
        font-size: 0.7rem;
        color: var(--muted);
        pointer-events: none;
      }

      .select-wrapper select:focus {
        border-color: var(--spm-accent);
        box-shadow: 0 0 0 3px rgba(0, 49, 161, 0.15);
      }

      /* ── Custom scope picker ── */

      .scope-picker {
        position: relative;
        margin-bottom: 0;
      }

      .scope-btn {
        width: 100%;
        padding: 10px 36px 10px 14px;
        font-size: 0.9rem;
        border-radius: 999px;
        border: 1px solid var(--border);
        background: var(--bg);
        text-align: center;
        color: var(--text);
        font-weight: 600;
        cursor: pointer;
        line-height: 1.3;
      }

      .scope-btn::after {
        content: "\25BC";
        position: absolute;
        right: 14px;
        top: 50%;
        transform: translateY(-50%);
        font-size: 0.7rem;
        color: var(--muted);
        pointer-events: none;
      }

      .scope-btn:focus {
        outline: none;
        border-color: var(--spm-accent);
        box-shadow: 0 0 0 3px rgba(0, 49, 161, 0.15);
      }

      .scope-btn-line1 {
        font-size: 0.78rem;
        font-weight: 600;
        color: var(--muted);
      }

      .scope-btn-line2 {
        font-size: 0.9rem;
        font-weight: 700;
        color: var(--text);
      }

      .scope-list {
        display: none;
        position: absolute;
        left: 0;
        right: 0;
        top: calc(100% + 6px);
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 12px;
        box-shadow: 0 6px 20px rgba(0, 0, 0, 0.18);
        z-index: 100;
        max-height: 60vh;
        overflow-y: auto;
        padding: 6px;
      }

      .scope-list.open { display: block; }

      .scope-item {
        padding: 10px 14px;
        border-radius: 10px;
        text-align: center;
        cursor: pointer;
        line-height: 1.3;
      }

      .scope-item:active,
      .scope-item.selected {
        background: linear-gradient(135deg, rgba(234, 0, 42, 0.08), rgba(0, 49, 161, 0.08));
      }

      .scope-item-line1 {
        font-size: 0.72rem;
        font-weight: 600;
        color: var(--muted);
      }

      .scope-item-line2 {
        font-size: 0.85rem;
        font-weight: 700;
        color: var(--text);
      }

      .scope-item-single {
        font-size: 0.9rem;
        font-weight: 700;
        color: var(--text);
      }

      /* ── Messages ── */

      .msg {
        width: 100%;
        border-radius: 12px;
        padding: 14px 16px;
        margin-bottom: 14px;
        text-align: center;
        font-size: 0.9rem;
        line-height: 1.4;
        box-shadow: 0 3px 10px rgba(0, 0, 0, 0.1);
      }

      .msg-error {
        background: #f8d7da;
        color: #721c24;
        border: 1px solid rgba(114, 28, 36, 0.2);
      }

      .msg-info {
        background: #e8f0fe;
        color: #1a3b6b;
        border: 1px solid #c3d4ff;
      }

      /* ── Results Card ── */

      .results-card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 12px;
        box-shadow: 0 3px 10px rgba(0, 0, 0, 0.1);
        margin-bottom: 14px;
      }

      /* ── Leaderboard Grid ── */

      .leaderboard-grid {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .leader-card {
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 12px 10px;
      }

      .leader-card-header {
        text-align: center;
        margin-bottom: 8px;
      }

      .leader-sp {
        font-size: 0.95rem;
        font-weight: 800;
        color: var(--spm-accent);
      }

      .leader-count {
        font-size: 0.95rem;
        font-weight: 600;
        color: var(--muted);
      }

      /* ── Name list (centered, wrapped pills) ── */

      .leader-names {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 6px;
      }

      .leader-badge {
        display: inline-block;
        padding: 5px 12px;
        border-radius: 999px;
        background: linear-gradient(135deg, rgba(234, 0, 42, 0.08), rgba(0, 49, 161, 0.08));
        border: 1px solid rgba(0, 49, 161, 0.15);
        color: var(--text);
        font-size: 0.88rem;
        font-weight: 600;
      }

      .leader-empty {
        font-size: 0.82rem;
        font-style: italic;
        color: var(--muted);
        padding: 4px 0;
      }

      /* ── Fix-It CTA ── */

      .fix-it {
        display: block;
        text-align: center;
        padding: 14px 12px;
        margin-bottom: 14px;
        border-radius: 12px;
        background: linear-gradient(135deg, var(--spm-primary), var(--spm-accent));
        box-shadow: 0 4px 14px rgba(0, 0, 0, 0.2);
        text-decoration: none;
        color: #fff;
        font-size: 0.88rem;
        font-weight: 800;
        line-height: 1.3;
      }

      .fix-it-sub {
        display: block;
        font-size: 0.7rem;
        font-weight: 500;
        opacity: 0.9;
        margin-top: 2px;
      }

      /* ── Footer ── */

      .footer-note {
        text-align: center;
        font-size: 0.72rem;
        color: var(--muted);
        margin: 20px 0 0;
        line-height: 1.4;
      }

      /* ================================================================
         TABLET OVERRIDES  (768px – 1199px)
         ================================================================ */

      @media (min-width: 768px) and (max-width: 1199px) {
        body { background: #e8e8e8; }

        .page {
          max-width: 620px;
          padding: 16px;
        }

        header {
          border-radius: 16px;
          padding: 14px 14px 12px;
          margin-bottom: 10px;
        }
        .title { font-size: 1.6rem; }
        .subtitle { font-size: 1.7rem; }
        .beta-pill { font-size: 0.65rem; padding: 3px 14px; }
        .header-status { font-size: 0.82rem; }

        .controls-card { border-radius: 16px; padding: 12px; margin-bottom: 10px; }
        .select-wrapper select { font-size: 0.88rem; padding: 8px 36px 8px 14px; }
        .scope-btn { font-size: 0.88rem; padding: 8px 36px 8px 14px; }
        .scope-btn-line1 { font-size: 0.75rem; }
        .scope-btn-line2 { font-size: 0.88rem; }
        .scope-list { border-radius: 14px; }
        .scope-item { padding: 8px 12px; border-radius: 10px; }
        .scope-item-line1 { font-size: 0.72rem; }
        .scope-item-line2 { font-size: 0.88rem; }
        .scope-item-single { font-size: 0.88rem; }

        .msg { font-size: 0.88rem; border-radius: 16px; padding: 12px; margin-bottom: 10px; }

        .results-card { border-radius: 16px; padding: 10px; margin-bottom: 10px; }
        .leader-card { border-radius: 14px; padding: 10px 8px; }
        .leader-sp { font-size: 1rem; }
        .leader-count { font-size: 1rem; }
        .leader-badge { font-size: 0.9rem; padding: 5px 12px; }
        .leader-empty { font-size: 0.82rem; }

        .fix-it { border-radius: 16px; font-size: 0.88rem; padding: 12px 10px; margin-bottom: 10px; }
        .fix-it-sub { font-size: 0.65rem; }
        .footer-note { font-size: 0.72rem; margin-top: 20px; }
      }

      /* ================================================================
         DESKTOP OVERRIDES  (>= 1200px)
         ================================================================ */

      @media (min-width: 1200px) {
        body { background: #e8e8e8; }

        .page {
          max-width: 900px;
          padding: 16px 24px;
        }

        /* ── Desktop header ── */
        header {
          border-radius: 12px;
          padding: 14px 24px 10px;
          margin-bottom: 10px;
          box-shadow: 0 3px 12px rgba(0, 0, 0, 0.2);
        }
        .title { font-size: 1.75rem; }
        .subtitle { font-size: 2.1rem; }
        .subtitle-group { margin-top: 4px; }
        .beta-pill {
          margin-top: 3px;
          padding: 2px 14px;
          font-size: 0.65rem;
          letter-spacing: 0.08em;
        }
        .header-status { display: none; }

        /* ── Desktop controls — horizontal row ── */
        .controls-card {
          display: flex;
          align-items: center;
          gap: 10px;
          border-radius: 10px;
          padding: 10px 12px;
          margin-bottom: 10px;
        }
        .select-wrapper {
          flex-shrink: 0;
          margin-bottom: 0;
        }
        .select-wrapper select {
          font-size: 0.82rem;
          padding: 7px 28px 7px 12px;
          text-align: left;
          text-align-last: left;
        }
        .select-wrapper::after { font-size: 0.6rem; right: 10px; }
        .scope-picker {
          flex: 1;
          margin-bottom: 0;
        }
        .scope-btn {
          font-size: 0.82rem;
          padding: 7px 28px 7px 12px;
          text-align: left;
        }
        .scope-btn::after { font-size: 0.6rem; right: 10px; }
        .scope-btn-line1 { font-size: 0.65rem; }
        .scope-btn-line2 { font-size: 0.82rem; }
        .scope-list {
          border-radius: 10px;
          padding: 4px;
          box-shadow: 0 4px 16px rgba(0, 0, 0, 0.15);
        }
        .scope-item {
          padding: 6px 10px;
          border-radius: 8px;
          text-align: left;
          transition: background 0.1s ease;
        }
        .scope-item:hover {
          background: rgba(0, 49, 161, 0.06);
        }
        .scope-item-line1 { font-size: 0.65rem; }
        .scope-item-line2 { font-size: 0.82rem; }
        .scope-item-single { font-size: 0.82rem; }

        /* ── Desktop messages ── */
        .msg {
          font-size: 0.88rem;
          border-radius: 10px;
          padding: 10px 12px;
          margin-bottom: 10px;
        }

        /* ── Desktop results — 2-column grid ── */
        .results-card {
          border-radius: 10px;
          padding: 10px;
          margin-bottom: 10px;
        }
        .leaderboard-grid {
          display: grid;
          grid-template-columns: repeat(2, 1fr);
          gap: 10px;
        }
        .leader-card {
          border-radius: 10px;
          padding: 10px 8px;
          transition: transform 0.15s ease, box-shadow 0.15s ease;
        }
        .leader-card:hover {
          transform: translateY(-2px);
          box-shadow: 0 6px 20px rgba(0, 0, 0, 0.12);
        }
        .leader-sp { font-size: 0.88rem; }
        .leader-count { font-size: 0.88rem; }
        .leader-badge {
          font-size: 0.82rem;
          padding: 4px 10px;
          transition: transform 0.1s ease;
        }
        .leader-badge:hover {
          transform: scale(1.03);
        }
        .leader-empty { font-size: 0.75rem; }
        .leader-names { gap: 6px; }

        /* ── Desktop CTA + footer ── */
        .fix-it {
          border-radius: 10px;
          font-size: 0.82rem;
          padding: 10px;
          margin-bottom: 10px;
          transition: filter 0.15s ease;
        }
        .fix-it:hover { filter: brightness(1.08); }
        .fix-it-sub { font-size: 0.6rem; }
        .footer-note { font-size: 0.68rem; margin-top: 14px; }
      }
    </style>
  </head>

  <body>
    <div class="page">
      <header>
        <h1 class="title">South Portland Metro APA</h1>
        <div class="subtitle-group">
          <div class="subtitle">SharpShooters</div>
          <div class="beta-pill">Beta</div>
        </div>
        <div class="header-status" id="statusText"></div>
      </header>

      <div class="controls-card">
        <div class="select-wrapper">
          <select id="sessionSelect">
            <option value="0">Loading sessions...</option>
          </select>
        </div>
        <div class="scope-picker" id="scopePicker">
          <div class="scope-btn" id="scopeBtn" tabindex="0">
            <div class="scope-btn-line2">Loading views...</div>
          </div>
          <div class="scope-list" id="scopeList"></div>
        </div>
      </div>

      <div id="messageContainer"></div>

      <section id="resultsCard" class="results-card" style="display: none;">
        <div id="leaderboardContainer" class="leaderboard-grid"></div>

        <div class="footer-note">
          Updates within 2-3 days of scoresheet review.
        </div>
      </section>

      <a class="fix-it" href="https://bit.ly/SPMFixIt" target="_blank">
        We missed one? Let us know!
        <span class="fix-it-sub">Tap here to report a missing one</span>
      </a>
    </div>

    <script>
      /* ── API ── */

      var API_URL = 'https://sharpshooters.spmapa.workers.dev';

      function callServer(action, params) {
        var payload = Object.assign({ action: action }, params || {});

        return fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain' },
          body: JSON.stringify(payload),
          redirect: 'follow'
        }).then(function(response) {
          if (!response.ok) throw new Error('Network error: ' + response.status);
          return response.json();
        });
      }

      /* ── State ── */

      var currentScope = "league";
      var currentTitle = "League Leaders";
      var currentItems = [];
      var scopeOptions = [];
      var scopeValue = "League Leaders";

      /* ── Helpers ── */

      function setStatus(t) {
        document.getElementById("statusText").textContent = t || "";
      }

      function showMessage(type, text) {
        var c = document.getElementById("messageContainer");
        c.innerHTML = "";
        if (!text) return;
        var d = document.createElement("div");
        d.className = "msg " + (type === "error" ? "msg-error" : "msg-info");
        d.textContent = text;
        c.appendChild(d);
      }

      function clearResults() {
        currentItems = [];
        document.getElementById("leaderboardContainer").innerHTML = "";
        document.getElementById("resultsCard").style.display = "none";
      }

      /* ── Render ── */

      function renderLeaderboard(data) {
        clearResults();

        if (!data || !data.success) {
          showMessage("error", (data && data.error) || "Unable to load leaderboard.");
          return;
        }

        currentScope = data.scope;
        currentTitle = data.title || "";
        currentItems = Array.isArray(data.items) ? data.items.slice() : [];

        var container = document.getElementById("leaderboardContainer");

        if (currentItems.length === 0) {
          var empty = document.createElement("div");
          empty.textContent = "No leaders recorded yet.";
          empty.style.fontSize = "0.9rem";
          empty.style.color = "var(--muted)";
          empty.style.textAlign = "center";
          empty.style.padding = "20px 0";
          container.appendChild(empty);
          document.getElementById("resultsCard").style.display = "block";
          return;
        }

        currentItems.forEach(function (item) {
          container.appendChild(buildLeaderCard(item));
        });

        document.getElementById("resultsCard").style.display = "block";
      }

      function buildLeaderCard(item) {
        var card = document.createElement("article");
        card.className = "leader-card";

        /* ── Header: centered SP name + meta ── */
        var header = document.createElement("div");
        header.className = "leader-card-header";

        var spEl = document.createElement("span");
        spEl.className = "leader-sp";
        spEl.textContent = item.spDescription || "";
        header.appendChild(spEl);

        if (item.count) {
          var countEl = document.createElement("span");
          countEl.className = "leader-count";
          countEl.textContent = " (" + item.count + ")";
          header.appendChild(countEl);
        }
        card.appendChild(header);

        /* ── All names as centered pills ── */
        var namesDiv = document.createElement("div");
        namesDiv.className = "leader-names";

        if (item.leaders.length === 0) {
          var emptyMsgs = [
            "Wide open \u2014 be the first!",
            "Unclaimed! Your name here?",
            "No one yet\u2026 your move.",
            "Still up for grabs!",
            "The throne is empty. Take it.",
            "Waiting for a legend\u2026",
            "Nobody? Somebody step up!",
            "This spot has your name on it.",
            "First one here gets bragging rights.",
            "Crickets\u2026 for now.",
            "Be the one they talk about.",
            "All yours if you want it.",
            "Ghost town. Go claim it.",
            "The table is set. Who's sitting down?",
            "Zero heroes so far. Change that."
          ];
          var emptyEl = document.createElement("div");
          emptyEl.className = "leader-empty";
          emptyEl.textContent = emptyMsgs[Math.floor(Math.random() * emptyMsgs.length)];
          namesDiv.appendChild(emptyEl);
        } else {
          item.leaders.forEach(function (name) {
            var badge = document.createElement("span");
            badge.className = "leader-badge";
            badge.textContent = name;
            namesDiv.appendChild(badge);
          });
        }

        card.appendChild(namesDiv);
        return card;
      }

      /* ── Load sessions ── */

      function loadSessions() {
        callServer('getSessions').then(function (sessions) {
          var sel = document.getElementById("sessionSelect");
          sel.innerHTML = "";
          if (!sessions || !sessions.length) {
            sel.innerHTML = '<option value="0">Current Session</option>';
            return;
          }
          sessions.forEach(function (s) {
            var opt = document.createElement("option");
            opt.value = s.index;
            opt.textContent = s.name;
            sel.appendChild(opt);
          });
        }).catch(function () {
          var sel = document.getElementById("sessionSelect");
          sel.innerHTML = '<option value="0">Current Session</option>';
        });
      }

      /* ── Scope picker ── */

      function updateScopeBtn(opt) {
        var btn = document.getElementById("scopeBtn");
        btn.innerHTML = "";
        if (opt.line1) {
          var l1 = document.createElement("div");
          l1.className = "scope-btn-line1";
          l1.textContent = opt.line1;
          btn.appendChild(l1);
        }
        var l2 = document.createElement("div");
        l2.className = "scope-btn-line2";
        l2.textContent = opt.line2;
        btn.appendChild(l2);
      }

      function buildScopeList() {
        var list = document.getElementById("scopeList");
        list.innerHTML = "";
        scopeOptions.forEach(function (opt) {
          var item = document.createElement("div");
          item.className = "scope-item";
          if (opt.value === scopeValue) item.classList.add("selected");

          if (opt.line1) {
            var l1 = document.createElement("div");
            l1.className = "scope-item-line1";
            l1.textContent = opt.line1;
            item.appendChild(l1);
            var l2 = document.createElement("div");
            l2.className = "scope-item-line2";
            l2.textContent = opt.line2;
            item.appendChild(l2);
          } else {
            var single = document.createElement("div");
            single.className = "scope-item-single";
            single.textContent = opt.line2;
            item.appendChild(single);
          }

          item.addEventListener("click", function () {
            scopeValue = opt.value;
            updateScopeBtn(opt);
            closeScopeList();
            loadLeaderboardForSelection();
          });
          list.appendChild(item);
        });
      }

      function toggleScopeList() {
        var list = document.getElementById("scopeList");
        if (list.classList.contains("open")) {
          closeScopeList();
        } else {
          buildScopeList();
          list.classList.add("open");
        }
      }

      function closeScopeList() {
        document.getElementById("scopeList").classList.remove("open");
      }

      /* ── Load options + default view ── */

      async function loadOptionsAndDefault() {
        var sessionIndex = document.getElementById("sessionSelect").value;
        showMessage("info", "Loading divisions...");

        try {
          var data = await callServer('getLeaderboardOptions', {
            sessionIndex: sessionIndex
          });
          if (!data || data.success === false) {
            showMessage("error", data && data.error ? data.error : "Unable to load options.");
            return;
          }

          scopeOptions = data.options || [];
          // Don't auto-select League Leaders — let user choose.
          // This avoids the expensive getLeagueLeaders call on page load.
          scopeValue = "";

          updateScopeBtn({ line1: "", line2: "Select a division..." });

          showMessage(null, "");
          // Do NOT call loadLeaderboardForSelection() here.
          // Leaders load only when user picks a scope or clicks a team pill.
        } catch (err) {
          showMessage("error", "Unexpected error while loading options.");
        }
      }

      /* ── Load leaderboard for current selection ── */

      async function loadLeaderboardForSelection() {
        // If no scope selected yet, don't load anything
        if (!scopeValue) return;

        showMessage("info", "Loading...");
        clearResults();
        var sessionIndex = document.getElementById("sessionSelect").value;

        try {
          var data;
          if (scopeValue === "League Leaders") {
            data = await callServer('getLeagueLeaders', {
              sessionIndex: sessionIndex
            });
          } else {
            data = await callServer('getDivisionLeaders', {
              divisionName: scopeValue,
              sessionIndex: sessionIndex
            });
          }

          showMessage(null, "");
          renderLeaderboard(data);
        } catch (err) {
          showMessage("error", "Unexpected error while loading leaderboard.");
        }
      }

      /* ── Init ── */

      document.addEventListener("DOMContentLoaded", async function () {
        // ── Maintenance mode check ──────────────────────────────────
        try {
          var maintResp = await fetch(API_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'text/plain' },
            body: JSON.stringify({ action: 'getMaintenanceMode' }),
            redirect: 'follow'
          }).then(function(r) { return r.json(); });

          if (maintResp.success && maintResp.enabled) {
            var urlParams = new URLSearchParams(window.location.search);
            var bypassKey = urlParams.get('key') || '';
            if (bypassKey !== maintResp.bypassKey) {
              // Show maintenance page and halt
              document.body.innerHTML = '';
              document.body.style.cssText = 'margin:0;padding:0;background:#111;display:flex;align-items:center;justify-content:center;min-height:100svh;font-family:system-ui,-apple-system,sans-serif;';
              var box = document.createElement('div');
              box.style.cssText = 'text-align:center;padding:48px 24px;max-width:500px;';
              box.innerHTML = '<div style="font-size:48px;font-weight:900;font-style:italic;color:#ea002a;line-height:1.1;margin-bottom:24px;">SharpShooters</div>'
                + '<div style="font-size:20px;font-weight:600;color:#0031a1;text-transform:uppercase;letter-spacing:0.15em;margin-bottom:16px;">Under Maintenance</div>'
                + '<div style="font-size:15px;color:#888;line-height:1.6;">We\'re making improvements.<br>Check back shortly.</div>';
              document.body.appendChild(box);
              document.body.style.visibility = 'visible';
              return; // Stop all further initialization
            }
          }
        } catch (e) {
          // Fail open - don't block users if maintenance check fails
        }

        // ── Maintenance check passed - reveal the page ──────────────
        document.body.style.visibility = 'visible';

        document.getElementById("scopeBtn")
          .addEventListener("click", toggleScopeList);

        document.addEventListener("click", function (e) {
          var picker = document.getElementById("scopePicker");
          if (!picker.contains(e.target)) closeScopeList();
        });

        document.getElementById("sessionSelect")
          .addEventListener("change", loadOptionsAndDefault);

        loadSessions();
        loadOptionsAndDefault();
      });
    </script>
  </body>
</html>
